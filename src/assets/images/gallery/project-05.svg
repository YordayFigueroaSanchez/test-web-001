<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Project Epsilon</title>
  <desc id="desc">Gradient showcase card for brand identity</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f1d09" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)" />
  <g opacity="0.28">
    <circle cx="280" cy="300" r="150" fill="#fdba74" />
    <circle cx="600" cy="300" r="150" fill="#fb923c" />
    <circle cx="920" cy="300" r="150" fill="#f97316" />
  </g>
  <text x="130" y="760" fill="#ffffff" font-family="Arial, sans-serif" font-size="96" font-weight="700">Project Epsilon</text>
  <text x="130" y="845" fill="#ffedd5" font-family="Arial, sans-serif" font-size="44">Brand identity</text>
