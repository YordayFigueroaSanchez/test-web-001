<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>test-web-001</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Modern, accessible, and responsive web application built with Angular 19 and Tailwind CSS.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; script-src 'self'; connect-src 'self';">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preload" href="assets/fonts/primary-font-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/primary-font-bold.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    // Anti-FOUC: Apply saved theme before first paint
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-50 transition-colors antialiased">
  <app-root></app-root>
</body>
</html>
