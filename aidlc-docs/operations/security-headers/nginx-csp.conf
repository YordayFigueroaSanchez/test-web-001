# Nginx security headers for static SPA on /test-web-001/
# Adjust root and server_name to your environment.

server {
    listen 443 ssl http2;
    server_name example.com;

    root /var/www/html;
    index index.html;

    location /test-web-001/ {
        try_files $uri $uri/ /test-web-001/index.html;

        # Core security headers
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; report-to csp-endpoint" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Reporting API
        add_header Reporting-Endpoints "csp-endpoint=\"https://example.invalid/csp-report\"" always;
        add_header Report-To "{\"group\":\"csp-endpoint\",\"max_age\":10886400,\"endpoints\":[{\"url\":\"https://example.invalid/csp-report\"}]}" always;
    }
}
