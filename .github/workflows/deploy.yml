name: Build, Deploy, and Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'aidlc-docs/audit.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Enforce CSP in headers (no CSP meta tags)
        run: |
          if grep -RIn --include='*.html' '<meta http-equiv="Content-Security-Policy"' src; then
            echo "::error::CSP meta tags are forbidden. Configure CSP in infrastructure headers."
            exit 1
          fi

      - name: Build
        run: npx ng build --base-href /${{ github.event.repository.name }}/

      - name: Prepare Pages artifact
        run: |
          rm -rf dist/test-web-001/pages-artifact
          mkdir -p dist/test-web-001/pages-artifact
          cp -R dist/test-web-001/browser/. dist/test-web-001/pages-artifact/
          if [ ! -f dist/test-web-001/pages-artifact/index.html ] && [ -f dist/test-web-001/pages-artifact/es/index.html ]; then
            cp -R dist/test-web-001/pages-artifact/es/. dist/test-web-001/pages-artifact/
          fi
          if [ -f dist/test-web-001/pages-artifact/index.html ]; then
            sed -i "s|<base href=\"/${{ github.event.repository.name }}/es/\">|<base href=\"/${{ github.event.repository.name }}/\">|g" dist/test-web-001/pages-artifact/index.html
            sed -i "s|<base href=\"/${{ github.event.repository.name }}/en/\">|<base href=\"/${{ github.event.repository.name }}/\">|g" dist/test-web-001/pages-artifact/index.html
          fi
          for html in dist/test-web-001/pages-artifact/index.html dist/test-web-001/pages-artifact/es/index.html dist/test-web-001/pages-artifact/en/index.html; do
            if [ -f "$html" ]; then
              sed -i -E "s#<link rel=\"stylesheet\" href=\"([^\"]+)\" media=\"print\" onload=\"this.media='all'\">#<link rel=\"stylesheet\" href=\"\\1\">#g" "$html"
              sed -i -E "s#<noscript><link rel=\"stylesheet\" href=\"[^\"]+\"></noscript>##g" "$html"
            fi
          done
          if [ ! -f dist/test-web-001/pages-artifact/404.html ] && [ -f dist/test-web-001/pages-artifact/index.html ]; then
            cp dist/test-web-001/pages-artifact/index.html dist/test-web-001/pages-artifact/404.html
          fi

      - name: Verify artifact integrity
        run: |
          test -f dist/test-web-001/pages-artifact/index.html
          find dist/test-web-001/pages-artifact -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/test-web-001/pages-artifact/SHA256SUMS.txt
          test -s dist/test-web-001/pages-artifact/SHA256SUMS.txt

      - name: Validate artifact HTML for Pages
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          ROOT_INDEX="dist/test-web-001/pages-artifact/index.html"

          test -f "$ROOT_INDEX"

          # Ensure the normalized root entrypoint points to the repo base path.
          if ! grep -q "<base href=\"/${REPO_NAME}/\">" "$ROOT_INDEX"; then
            echo "::error file=$ROOT_INDEX::Root base href is not normalized to /${REPO_NAME}/"
            exit 1
          fi

          # Fail fast if deferred stylesheet tags that rely on inline onload remain.
          while IFS= read -r html; do
            if grep -Eq '<link rel="stylesheet"[^>]*media="print"[^>]*onload=' "$html"; then
              echo "::error file=$html::Found deferred stylesheet pattern (media=print + onload)."
              exit 1
            fi
            if grep -Eq '<meta http-equiv="Content-Security-Policy"' "$html"; then
              echo "::error file=$html::CSP meta tags are forbidden in deployed HTML."
              exit 1
            fi
          done < <(find dist/test-web-001/pages-artifact -type f -name '*.html' | sort)

      - name: Generate security headers policy file
        run: |
          cat > dist/test-web-001/pages-artifact/_headers << 'EOF'
          /*
            Content-Security-Policy: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; report-to csp-endpoint
            Referrer-Policy: strict-origin-when-cross-origin
            X-Content-Type-Options: nosniff
            X-Frame-Options: DENY
            Permissions-Policy: geolocation=(), microphone=(), camera=(), payment=()
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Resource-Policy: same-origin
            Reporting-Endpoints: csp-endpoint="https://example.invalid/csp-report"
            Report-To: {"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"https://example.invalid/csp-report"}]}
          EOF

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/test-web-001/pages-artifact

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  audit-log:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Append deployment result to AI-DLC audit log
        env:
          BUILD_STATUS: ${{ needs.build.result }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "## OPERACIONES - Despliegue GitHub Pages"
            echo "**Timestamp**: ${timestamp}"
            echo "**User Input**: \"N/A (Automatizado por GitHub Actions)\""
            echo "**AI Response**: \"Despliegue ejecutado. Build=${BUILD_STATUS}, Deploy=${DEPLOY_STATUS}, URL=${PAGE_URL:-N/A}, RunID=${RUN_ID}, Commit=${SHA}\""
            echo "**Context**: OPERACIONES - Pipeline automático. Trigger actor=${ACTOR}."
            echo
            echo "---"
            echo
          } >> aidlc-docs/audit.md

      - name: Commit and push audit log update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aidlc-docs/audit.md
          if git diff --cached --quiet; then
            echo "No audit changes to commit."
            exit 0
          fi
          git commit -m "chore(audit): append deployment status [skip ci]"
          git push
